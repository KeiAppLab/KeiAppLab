<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | 啓 App Lab</title>
    <style>
        body { 
            margin: 0; padding: 20px; box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            /* 修正：親のカーボンを透かすため、鉄紺色(#0F1A45)から「半透明の色」に変更 */
            background-color: rgba(15, 26, 69, 0.5); 
            color: #ddd;
            height: 100vh; display: flex; flex-direction: column;
        }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { border-bottom: 3px solid #0056b3; padding-bottom: 10px; font-size: 1.5rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="email"], input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        input[readonly] { background-color: #e9ecef; color: #555; }
        button { background-color: #0056b3; color: white; padding: 12px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #messageBox { margin-top: 15px; font-weight: bold; text-align: center; display: none; padding: 10px; border-radius: 4px; }
    </style>

    <!-- ★ここにreCAPTCHAの「サイトキー」を入れます -->
    <script src="https://www.google.com/recaptcha/api.js?render=6LfDYn8sAAAAALVe1pYZypE_9STyMp4j_PNtIzqs"></script>
</head>
<body>

<div class="container">
    <h1>お問い合わせ</h1>
    <p>以下のフォームに必要事項をご記入の上、送信してください。</p>

    <form id="contactForm">
        <div class="form-group">
            <label>対象のプロジェクト（件名）</label>
            <!-- URLパラメータから取得して読み取り専用にする -->
            <input type="text" id="subject" readonly>
        </div>

        <div class="form-group">
            <label>返信用メールアドレス <span style="color:red;">*</span></label>
            <input type="email" id="email" required placeholder="your@email.com">
        </div>

        <div class="form-group">
            <label>お問い合わせ内容 <span style="color:red;">*</span></label>
            <textarea id="body" rows="6" required placeholder="ご質問やご要望、データ削除依頼などをご記入ください。"></textarea>
        </div>

        <button type="submit" id="submitBtn">送信する</button>
        <div id="messageBox"></div>
        <div style="font-size: 0.75rem; color: #888; text-align: center; margin-top: 15px;">
            This site is protected by reCAPTCHA and the Google 
            <a href="https://policies.google.com/privacy" target="_blank">Privacy Policy</a> and 
            <a href="https://policies.google.com/terms" target="_blank">Terms of Service</a> apply.
        </div>
    </form>
</div>

<script>
    // 1. URLパラメータからプロジェクト名を取得して入力欄にセットする
    window.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        let project = urlParams.get('project');
        
        if (!project) project = "全般的なお問い合わせ";
        document.getElementById('subject').value = project;
    });

    // 2. 送信処理
    document.getElementById('contactForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const msgBox = document.getElementById('messageBox');
        
        const email = document.getElementById('email').value;
        const subject = document.getElementById('subject').value;
        const body = document.getElementById('body').value;

        btn.disabled = true;
        btn.textContent = "セキュリティ確認中...";

        try {
            // --- reCAPTCHA v3 トークンの取得 ---
            // ★ここにも「サイトキー」を入れます
            const token = await grecaptcha.execute('6LfDYn8sAAAAALVe1pYZypE_9STyMp4j_PNtIzqs', {action: 'submit_contact'});
            
            btn.textContent = "送信中...";

            // ★ここにGASのウェブアプリURLを貼り付けます
            const gasUrl = "https://script.google.com/macros/s/AKfycbwUQ7Gr63eB7UixIBry_AGSBPb94nnV2-bOf7HOjKtCNA-GJrQJ2MWO6zEJYQMmGmMK/exec";

            const response = await fetch(gasUrl, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({
                    action: "send",
                    email: email,
                    subject: subject,
                    body: body,
                    recaptchaToken: token // 取得したトークンを一緒に送る
                })
            });

            // GASからのJSONレスポンスを解析してエラーがあれば投げる
            const result = await response.json();
            if (result.status !== "success") {
                throw new Error(result.message);
            }

            msgBox.textContent = "✅ お問い合わせを送信しました。";
            msgBox.style.color = "#155724";
            msgBox.style.backgroundColor = "#d4edda";
            msgBox.style.border = "1px solid #c3e6cb";
            msgBox.style.display = "block";
            
            document.getElementById('body').value = ""; // 本文だけクリア

        } catch (err) {
            msgBox.textContent = "❌ 送信失敗: " + err.message;
            msgBox.style.color = "#721c24";
            msgBox.style.backgroundColor = "#f8d7da";
            msgBox.style.border = "1px solid #f5c6cb";
            msgBox.style.display = "block";
        } finally {
            btn.disabled = false;
            btn.textContent = "送信する";
        }
    });
</script>

</body>
</html>

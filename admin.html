<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEI Lab マスター・コックピット</title>
    <!-- 認証用リストだけ読み込み -->
    <script src="allowed_users.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Roboto:wght@400;500;900&display=swap');

        body, html { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #1e1e1e; color: #ddd; height: 100vh; overflow: hidden; }
        
        /* 認証前の表示制御 */
        #mainWrapper { display: none; height: 100%; }

        /* ログイン画面（以前のスタイルを移植） */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-container-split { display: flex; width: 850px; height: 500px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-left { width: 40%; padding: 40px; display: flex; flex-direction: column; justify-content: center; background: #f9f9f9; border-right: 1px solid #eee; }
        .login-left input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; color: #333; }
        .login-left button { width: 100%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .login-right { width: 60%; padding: 40px; overflow-y: auto; color: #333; line-height: 1.6; }

        /* メインレイアウト */
        .dashboard { display: grid; grid-template-columns: 250px 1fr; height: 100%; }
        
        /* サイドバー（固定） */
        .sidebar { background: #252526; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; }
        .sidebar h1 { font-size: 1.2rem; color: #fff; margin: 20px 10px; border-bottom: 2px solid #007acc; padding-bottom: 10px; }
        
        /* リンクを a タグに変更 */
        .menu-link { 
            padding: 15px; margin-bottom: 5px; cursor: pointer; border-radius: 5px; color: #aaa; font-weight: bold; text-decoration: none;
            display: flex; align-items: center; gap: 10px; transition: 0.2s;
        }
        .menu-link:hover { background: #3c3c3c; color: #fff; }
        .menu-link.active { background: #007acc; color: white; }

        /* 右側モニターエリア */
        .main-content { flex: 1; height: 100%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

    </style>
</head>
<body>

    <!-- ログイン画面 -->
    <div id="loginOverlay">
        <div class="login-container-split">
            <div class="login-left">
                <h2 style="color:#333;">🚀 KEI Lab Admin</h2>
                <input type="password" id="tokenInput" placeholder="GitHub Token (ghp_...)">
                <button onclick="checkIdentity()">ログイン</button>
                <div id="authStatus"></div>
            </div>
            <div class="login-right">
                <h3>🔑 本人確認システム</h3>
                <p>このコックピットは関係者専用です。GitHubトークンを入力して入室してください。</p>
            </div>
        </div>
    </div>

    <!-- メイン画面 -->
    <div id="mainWrapper">
        <div class="dashboard">
            <div class="sidebar">
                <h1>🚀 KEI Lab Cockpit</h1>
                
                <!-- ターゲットを iframe の名前 (main_monitor) に向けるのがコツです -->
                
                <a href="calc.html" target="main_monitor" class="menu-link active" onclick="updateActive(this)">💰 収益・秒数計算</a>
                <a href="cms.html" target="main_monitor" class="menu-link" onclick="updateActive(this)">📝 コンテンツ編集</a>
                <a href="users.html" target="main_monitor" class="menu-link" onclick="updateActive(this)">👥 権限管理</a>

                <div style="flex-grow:1;"></div>
                <button onclick="logout()" style="background:#c0392b; color:white; border:none; padding:10px; cursor:pointer; border-radius:5px;">🔒 ログアウト</button>
            </div>

            <div class="main-content">
                <!-- ここがコンテンツを表示する「モニター」になります -->
                <iframe name="main_monitor" id="main_monitor" src="cms.html"></iframe>
            </div>
        </div>
    </div>

    <script>
        // --- 認証機能 (親が代表して行う) ---
        async function checkIdentity(savedToken = null) {
            const token = savedToken || document.getElementById('tokenInput').value.trim();
            const status = document.getElementById('authStatus');
            if (!token) return;

            try {
                const res = await fetch("https://api.github.com/user", { headers: { Authorization: `token ${token}` } });
                if (!res.ok) throw new Error();
                const userData = await res.json();

                if (allowedUsersData.includes(userData.login)) {
                    localStorage.setItem('gh_token', token);
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('mainWrapper').style.display = 'block';
                } else {
                    if(status) status.innerText = "❌ 権限がありません";
                }
            } catch (err) {
                if(status) status.innerText = "⚠️ トークンが無効です";
            }
        }

        function updateActive(el) {
            document.querySelectorAll('.menu-link').forEach(link => link.classList.remove('active'));
            el.classList.add('active');
        }

        function logout() { localStorage.removeItem('gh_token'); location.reload(); }

        window.addEventListener('load', () => {
            const t = localStorage.getItem('gh_token');
            if (t) checkIdentity(t);
        });
    </script>
</body>
</html>
